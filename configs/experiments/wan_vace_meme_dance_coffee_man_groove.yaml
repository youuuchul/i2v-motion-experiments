experiment: wan_vace_meme_dance_coffee_man_groove
notes: |
  meme_dance_ref — 서틀 그루브 (하이에너지 아닌 절제된 리듬).
  베이스: 자체 샘플 coffee_man.png. 어깨·머리·상체만 미세하게 리듬 타는 버전.
tags: ["v2", "meme_dance_v2", "meme_dance_ref", "subtle_groove", "own_sample_only", "5s"]

template:
  motion_template: null
  meme_template: meme_dance_ref
  category: meme
  subcategory: meme_dance_ref
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  source_reference:
    url: https://www.youtube.com/shorts/0qKKrIXT1Lo
    description: "댄스 리듬 참조 (절제된 상체 그루브). 이미지는 자체 샘플 coffee_man.png."
  prompt: "the young man with iced coffee gently bobs his head and rolls his shoulders to a chill music beat, subtle rhythmic sway of upper body, free hand taps the air lightly in time, relaxed cool confident vibe, warm rooftop cafe sunset bokeh background stays fixed, upper body framing, natural selfie angle, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, coffee spilling, text overlay, wild full-body dance, jumping, legs kicking, camera shake"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_dance_coffee_man_groove
