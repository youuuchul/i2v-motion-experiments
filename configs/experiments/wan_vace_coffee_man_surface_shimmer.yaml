experiment: wan_vace_coffee_man_surface_shimmer
notes: |
  motion round7 — surface_shimmer 프리미티브. coffee_man.png 의 아이스커피 컵 표면에 응결수 반짝임 + 잔잔한 리플.
tags: ["v2", "motion_round7", "surface_shimmer", "motion_primitive", "5s"]

template:
  motion_template: surface_shimmer
  meme_template: null
  category: motion
  subcategory: surface_shimmer
  intent: product_showcase

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
