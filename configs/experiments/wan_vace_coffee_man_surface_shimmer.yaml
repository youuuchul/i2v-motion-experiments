  negative_prompt: "low quality, blurry, watermark, distorted, jittery, cup deformation, cup tipping, coffee spilling, excessive waves, cartoon ripples, face morphing, text overlay, camera shake, NSFW"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_man_surface_shimmer
