experiment: wan_vace_coffee_consume_drink
notes: "남자+아이스커피 → 커피를 입으로 가져가 한 모금 마시는 액션. motion_template=consume_product 첫 검증 (face_reveal 대체제)"
tags: ["v2", "motion_validation", "consume_product"]

template:
  motion_template: consume_product
  meme_template: null
  category: person_action
  subcategory: consume_drink
  intent: product_showcase

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  prompt: "young man bringing the iced coffee cup to his lips and taking a refreshing sip, ice cubes gently shifting inside the glass, condensation droplets sliding down the cup, natural relaxed expression with slight smile, warm rooftop bokeh of string lights at sunset"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo, extra fingers, cup deformation, hand merging with face"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_consume_drink
