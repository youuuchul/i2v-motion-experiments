experiment: wan_vace_coffee_man_dolly_pan
notes: "남자+아이스커피 → 돌리 팬 카메라 워크 (인물 카메라 이동)"
tags: ["baseline", "v1"]

template:
  category: camera_move
  subcategory: dolly_pan
  intent: portrait

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  prompt: "slow dolly pan across the young man holding an iced coffee, cinematic documentary style, warm sunset bokeh of rooftop string lights, shallow depth of field, smooth camera slide"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo, extra fingers"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_man_dolly_pan
