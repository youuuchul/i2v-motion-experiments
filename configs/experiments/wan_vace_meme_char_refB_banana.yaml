experiment: wan_vace_meme_char_refB_banana
notes: |
  meme_ai_character / ai_character_2 스타일 (쭈방 꿀팁/배민). 클레이메이션 캐릭터.
  베이스: assets/memes/ai_character_2/frames/frame_25.jpg (클레이 바나나 캐릭터).
  i2v 로 클레이 질감 유지하면서 미세 흔들림·깜빡임 이어가는지 검증.
tags: ["v2", "meme_round5", "meme_ai_character", "claymation_character", "i2v_ref_start"]

template:
  motion_template: null
  meme_template: meme_ai_character
  category: meme
  subcategory: meme_ai_character
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/memes/ai_character_2/frames/frame_25.jpg
  prompt: "cute claymation stop-motion style preserved, the small yellow clay banana bunch character with simple smile gently sways hanging on the silver clay hook, subtle breath-like motion, tiny blink, warm pastel clay textured kitchen background stays still, soft diffused lighting, slow barely-perceptible camera drift, 9:16 vertical, stop-motion animation feel"
  negative_prompt: "low quality, blurry, watermark, distorted, photorealistic texture, sharp edges, real fruit, real human, gritty, horror, dramatic motion, text overlay change, cartoon 2D style, CGI smooth"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_char_refB_banana
