experiment: wan_vace_coffee_man_rim_light
notes: "남자+아이스커피 → 역광 림라이트 윤곽 효과 (camera_move/rim_light)"
tags: ["baseline", "v2", "lighting"]

template:
  category: camera_move
  subcategory: rim_light
  intent: portrait

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  prompt: "strong rim light wrapping around the young man's silhouette from behind, glowing edge highlights along his hair and shoulders, warm sunset backlight, subject's face softly lit from ambient bounce, slow subtle motion, cinematic mood"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo, flat lighting"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_man_rim_light
