experiment: wan_vace_meme_dance_man_box_beat_matched
notes: |
  meme_dance_ref round7 — 베이스 확장: man_box 에 beat_matched 프롬프트 적용. Round6 coffee_man_beat_matched 와 비교 가능.
  베이스: 자체 샘플 man_box.JPG (레퍼런스 프레임 사용 금지).
tags: ["v2", "meme_round7", "meme_dance_ref", "beat_matched_prompt", "own_sample_only", "5s"]

template:
  motion_template: null
  meme_template: meme_dance_ref
  category: meme
  subcategory: meme_dance_ref
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/man_box.JPG
  source_reference:
    url: https://www.youtube.com/shorts/0qKKrIXT1Lo
    description: "붐샤카라카 댄스 안무 — 시간 세그먼트 프롬프트. 이미지는 자체 샘플 man_box.JPG."
  prompt: "the young man in dark gray oversized hoodie still holding the small gift box performs a short trending viral dance in 5 seconds, beat-matched choreography: at 0-1s he sways his hips and shoulders left and right twice while bobbing his head, at 1-2s his free arm rises up above his head and alternates side to side in rhythm, at 2-3s he pumps his free fist forward twice in sharp beat pumps, at 3-4s he does a small hop in place with shoulders rolling, at 4-5s he lands into a playful pose with a big natural smile still holding the box, bright kitchen background stays fixed, upper body framing, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, box disappearing, box deformation, text overlay, static still pose, only head moving, camera shake, horror, NSFW, slow motion, freeze frame"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_dance_man_box_beat_matched
