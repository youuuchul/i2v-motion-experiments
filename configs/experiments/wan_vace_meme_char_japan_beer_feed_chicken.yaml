  image: assets/samples/japan_beer_chicken.png
  prompt: "the left beer mug slowly comes to life, two stubby glass arms form from its sides and cartoon eyes pop open above the foam line, the foam shapes into a smiling mouth, the beer mug character leans forward on the tabletop, at 1-2s it reaches one glass arm down and picks up the front yakitori chicken skewer from the black plate, at 2-3s it lifts the skewer with one arm and extends it forward toward the camera in an offer gesture, at 3-4s it pushes the skewer even closer filling most of the frame as if feeding the viewer, sesame seeds and glossy tare sauce clearly visible on the chicken, at 4-5s the beer mug pulls back slightly and winks while keeping the skewer pointed at the camera, the right beer mug stays still in the background, izakaya wooden tabletop background stays fixed, single centered framing, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, beer spilling, beer mug tipping over permanently, plate flying, extra beer mugs, scary face, horror, text overlay, camera shake, NSFW, aggressive motion, skewer stabbing lens"

run:
  seed: 42
  num_inference_steps: 40
