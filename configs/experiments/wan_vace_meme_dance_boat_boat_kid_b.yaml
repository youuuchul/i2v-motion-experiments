  안무 핵심 동사를 순차 나열). A/B 비교로 beat-match prompt 형식 vs natural-sequence prompt 형식 품질 차이 검증.
tags: ["v2", "meme_boat_dance_round1", "meme_dance_ref", "boat_dance", "own_sample_only", "natural_sequence_prompt", "5s"]

template:
