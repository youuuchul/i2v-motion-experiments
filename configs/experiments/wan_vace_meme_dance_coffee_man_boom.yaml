  베이스: 자체 샘플 coffee_man.png. 안무는 레퍼런스 영상에서 프롬프트로만 전달.
  레퍼런스 프레임을 i2v 입력으로 쓰면 안 됨 — 우리 샘플만 base.
tags: ["v2", "meme_dance_v2", "meme_dance_ref", "high_energy", "own_sample_only", "5s"]

template:
