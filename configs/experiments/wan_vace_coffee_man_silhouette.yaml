experiment: wan_vace_coffee_man_silhouette
notes: "남자+아이스커피 → 강한 역광 실루엣 (camera_move/silhouette)"
tags: ["baseline", "v2", "lighting"]

template:
  category: camera_move
  subcategory: silhouette
  intent: portrait

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  prompt: "strong backlight rendering the young man as a near-pure black silhouette against a glowing amber sunset sky, only the outline of his figure and the iced coffee cup visible, dramatic high-contrast cinematic frame, subtle ambient motion in the background"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo, flat lighting, fully visible face"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_man_silhouette
