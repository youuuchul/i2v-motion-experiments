  meme_template: meme_dance_ref
  category: meme
  subcategory: meme_dance_ref
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  source_reference:
    url: https://www.youtube.com/shorts/0qKKrIXT1Lo
    description: "붐샤카라카 댄스 안무 참조 (프롬프트로만 전달). 이미지는 자체 샘플 coffee_man.png."
  prompt: "the young man starts an energetic viral dance while still holding the iced coffee cup in one hand, he rhythmically sways his hips side to side, his free arm pumps up into the air and back down in beat, shoulders roll alternately, he slightly hops in place with bouncy energy, big confident smile on his face, warm rooftop sunset bokeh background stays fixed, full upper-body and partial leg framing, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, coffee cup disappearing, coffee spilling, text overlay, static still pose, only head moving, camera shake, horror, NSFW"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
