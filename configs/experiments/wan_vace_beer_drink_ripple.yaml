experiment: wan_vace_beer_drink_ripple
notes: "맥주+치킨 → 맥주 거품/기포 출렁임 (음료 미세 움직임, 주류)"
tags: ["baseline", "v1"]

template:
  category: drink_motion
  subcategory: foam_settle
  intent: product_showcase

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/beer.png
  prompt: "beer foam slowly settling with tiny bubbles rising through the golden lager, glass condensation glistening, subtle liquid motion, moody warm pub lighting"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_beer_drink_ripple
