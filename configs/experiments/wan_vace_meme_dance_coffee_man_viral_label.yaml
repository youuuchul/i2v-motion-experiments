experiment: wan_vace_meme_dance_coffee_man_viral_label
notes: |
  meme_dance_ref round6 — **미니멀 프롬프트** 전략. 구체적 동작 묘사 대신 간단한 "trending TikTok viral dance" 라벨로 모델이 얼마나 해석하는지 측정.
  베이스: 자체 샘플 coffee_man.png.
tags: ["v2", "meme_round6", "meme_dance_ref", "viral_label_prompt", "minimal_prompt", "own_sample_only", "5s"]

template:
  motion_template: null
  meme_template: meme_dance_ref
  category: meme
  subcategory: meme_dance_ref
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  source_reference:
    url: https://www.youtube.com/shorts/0qKKrIXT1Lo
    description: "붐샤카라카 댄스 레퍼런스 — 프롬프트는 미니멀 라벨만. 이미지는 자체 샘플 coffee_man.png."
  prompt: "the young man still holding his iced coffee does an energetic trending TikTok viral dance, high energy, natural smile, rooftop cafe sunset background, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, coffee spilling, text overlay, static still pose, camera shake, horror, NSFW"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_dance_coffee_man_viral_label
