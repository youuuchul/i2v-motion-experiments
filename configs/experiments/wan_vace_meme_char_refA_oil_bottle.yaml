experiment: wan_vace_meme_char_refA_oil_bottle
notes: |
  meme_ai_character / ai_character_1 스타일 — 이미 얼굴/팔이 있는 레퍼런스 첫 프레임에서 시작.
  베이스: assets/memes/ai_character_1/frames/frame_0.jpg (올리브오일 병 의인화 캐릭터).
  i2v 로 해당 캐릭터의 움직임(팔 제스처·표정 변화)을 이어가는지 검증 — 가장 쉬운 케이스.
tags: ["v2", "meme_round5", "meme_ai_character", "realistic_anthropomorph", "i2v_ref_start"]

template:
  motion_template: null
  meme_template: meme_ai_character
  category: meme
  subcategory: meme_ai_character
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/memes/ai_character_1/frames/frame_0.jpg
  prompt: "the anthropomorphized olive oil bottle character gestures dramatically with both thin cartoon arms raised, its exaggerated worried eyes widening, mouth open in dramatic protest, the bottle's dark green glass body slightly sways side to side, realistic rustic kitchen background stays still, warm kitchen lighting preserved, 9:16 vertical, exaggerated facial expression animation"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, realistic human face, losing the face, losing the arms, flat 2D cartoon, clay texture, text overlay caption change, scene swap"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_char_refA_oil_bottle
