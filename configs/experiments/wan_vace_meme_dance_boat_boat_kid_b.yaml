input:
  mode: i2v
  image: assets/samples/boat_kid.png
  source_reference:
    url: https://www.youtube.com/shorts/Or_1yQGAjCQ
    description: "드래곤 보트 레전드 꼬마 선장 안무 — natural-sequence 프롬프트. 이미지는 자체 샘플 boat_kid.png."
  prompt: "the child in the photo keeps the same face and outfit and background, then smoothly performs a short trending conductor dance: both hands come forward palms down and wave left and right lightly to the beat, then both hands start drawing small forward circles in front of the body, then the right arm stretches forward and the left arm stretches back in a wide lunge and the arms alternate like a swimming stroke, finally the right arm extends straight toward the camera in a confident finishing pose, body stays on the boat the whole time, water ripples gently, crew and background remain fixed, full body framing, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, identity change, person teleporting, boat tipping, child falling into water, subtitles, text overlay, static still pose, only head moving, camera shake, horror, NSFW, slow motion, freeze frame"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_dance_boat_boat_kid_b
