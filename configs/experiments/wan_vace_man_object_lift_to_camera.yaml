experiment: wan_vace_man_object_lift_to_camera
notes: "남자+레트로 스피커(man_object.png) → 스피커를 카메라 쪽으로 더 내미는 액션. motion_template=lift_to_camera 검증"
tags: ["v2", "motion_validation", "lift_to_camera", "man_object_batch"]

template:
  motion_template: lift_to_camera
  meme_template: null
  category: person_action
  subcategory: lift_to_camera
  intent: product_showcase

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/man_object.png
  prompt: "young man in a beige puffer jacket smoothly extending his arm forward to present the small retro-style portable speaker closer to the camera lens, the product becomes more prominent in frame, subtle depth shift with slight dolly-in, soft warm indoor light, confident relaxed smile, 9:16 vertical composition"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo duplication, extra fingers, hand deformation, product deformation, face distortion"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_man_object_lift_to_camera
