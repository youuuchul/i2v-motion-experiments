experiment: wan_vace_meme_dance_sample_viral_label
notes: |
  meme_dance_ref round7 — sample.png (여성, 레퍼런스 주체와 성별 매칭) 에 미니멀 viral_label 프롬프트.
  Round6 sample_female_boom/beat_matched 와 비교. 가설: 주체 매칭이 있으면 라벨만으로도 자연스러운 춤 가능.
  베이스: 자체 샘플 sample.png (레퍼런스 프레임 사용 금지).
tags: ["v2", "meme_round7", "meme_dance_ref", "viral_label_prompt", "minimal_prompt", "subject_match", "own_sample_only", "5s"]

template:
  motion_template: null
  meme_template: meme_dance_ref
  category: meme
  subcategory: meme_dance_ref
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/sample.png
  source_reference:
    url: https://www.youtube.com/shorts/0qKKrIXT1Lo
    description: "붐샤카라카 댄스 레퍼런스 — 프롬프트는 미니멀 라벨만. 이미지는 자체 샘플 sample.png (여성)."
  prompt: "the young Korean woman with long dark hair puts down her coffee and does an energetic trending TikTok viral dance, high energy, playful natural smile, warm cafe interior with string lights background, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, face morphing, extra arms, cup deformation, text overlay, static still pose, camera shake, horror, NSFW, body proportions warping"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_dance_sample_viral_label
