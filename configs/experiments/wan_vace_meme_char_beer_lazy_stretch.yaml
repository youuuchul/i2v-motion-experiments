experiment: wan_vace_meme_char_beer_lazy_stretch
notes: |
  meme_ai_character round7 — 맥주병이 아침에 일어나 느긋하게 하품하고 기지개 켜는 풀바디 스탠드업 밈.
  베이스: 자체 샘플 beer.png. 기존 angry/chicken 과 다른 평화로운 캐릭터 톤 검증.
tags: ["v2", "meme_round7", "meme_ai_character", "realistic_food_anthropomorph", "5s"]

template:
  motion_template: null
  meme_template: meme_ai_character
  category: meme
  subcategory: meme_ai_character
  intent: meme

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/meme_5s.yaml

input:
  mode: i2v
  image: assets/samples/beer.png
  prompt: "the amber beer bottle wakes up, stubby cartoon arms sprout from its sides and two small legs extend from the bottom, it stretches both arms up high above its cap in a big morning yawn, cap pops open slightly letting out a sleepy sigh, eyes blink slowly on the front label, it rubs one eye with a little stubby hand, gentle swaying motion, warm pub tabletop background stays fixed, single centered framing, handheld phone camera feel, 9:16 vertical"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, bottle deformation, bottle tipping over, bottle spilling, extra bottles, scary face, horror, text overlay, camera shake, NSFW, aggressive motion"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_meme_char_beer_lazy_stretch
