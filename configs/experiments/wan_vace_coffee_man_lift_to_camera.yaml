experiment: wan_vace_coffee_man_lift_to_camera
notes: "남자+아이스커피 → 커피잔을 카메라 쪽으로 들어올리는 액션. motion_template=lift_to_camera · 원래 offer_drink 와 다른 수직 리프트 축"
tags: ["v2", "motion_validation", "lift_to_camera", "coffee_man_batch"]

template:
  motion_template: lift_to_camera
  meme_template: null
  category: person_action
  subcategory: lift_to_camera
  intent: product_showcase

model_config: configs/models/wan2_1_vace_14b.yaml
preset: configs/presets/smoke_test.yaml

input:
  mode: i2v
  image: assets/samples/coffee_man.png
  prompt: "young man smoothly lifting the iced coffee cup upward toward the camera lens, the glass becoming more prominent in the foreground, condensation droplets catching soft warm light, ice cubes gently shifting inside, relaxed confident expression, subtle dolly-in with shallow depth of field, rooftop string light bokeh at sunset, 9:16 vertical composition"
  negative_prompt: "low quality, blurry, watermark, distorted, jittery, glitchy, text, logo, extra fingers, hand deformation, cup deformation, face distortion, spilled drink, identity shift"

run:
  seed: 42
  num_inference_steps: 40
  guidance_scale: 5.0
  out_dir: outputs/wan_vace_coffee_man_lift_to_camera
